<html>
<head>
	<title>Plane Dodger</title>
</head>
<body>

<script src="js/vector2.js"></script>
<script src="js/physics.js"></script>

<script src="js/sprite.js"></script>
<script src="js/input.js"></script>
<script src="js/texture.js"></script>
<script src="js/label.js"></script>
<script src="js/utilities.js"></script>

<canvas width=450 height=600 id="canvas"></canvas>

<script>

// =================================================

let running = true;

// Create a new variable, "input", that is set as an Object of the input.js class.
let input = new Input();

// Set up our canvas and Graphics Context.
let canvas = document.getElementById("canvas");
let context = canvas.getContext("2d");

// Create the background image and size it to the canvas size.
let backSprite = new Sprite(225, 300);
backSprite.setTexture( 
	new Texture("images/plane-dodger/sky.png")); 
backSprite.setSize(450, 600);

// Create playerSprite, the sprite that the player will control, and set its starting
// position, texture, size, and wrapping. Velocity is set within update(), in moveDistanceAtAngle() function call.
let playerSprite = new Sprite(128, 256);
playerSprite.setTexture( 
	new Texture("images/plane-dodger/planeGreen0.png")); 
playerSprite.setSize(50, 50);
playerSprite.setWrap(512, 512);
playerSprite.setPhysics(150, 300, 10);
playerSprite.physics.setMotionAngle(90);

// Create the array spriteArray, and push each Sprite into the array to be instantiated.
let spriteArray = [];
spriteArray.push(backSprite, playerSprite);



// Creates enemyArray to hold any enemies on screen
let enemyArray = [];

let enemyTexture = new Texture("images/plane-dodger/planeRed0.png");

// Fills enemyArray with enemies, sets their starting position, their texture, their size, their
// velocity, and their wrapping.
for(i = 0; i < 3; i++)
{
	let tempAngle = Math.random() * (2 * Math.PI);
	let tempX = Math.cos(tempAngle) * 200 + 256;
	let tempY = Math.sin(tempAngle) * 200 + 256;

	let enemySprite = new Sprite(tempX, tempY);	
	enemySprite.setTexture(enemyTexture);
	enemySprite.setSize(50, 50);				

	// Set the current enemy Sprite's physics, using maxVel and minVel to generate a random velocity between a range, and
	// manually setting the acceleration and deceleration.  
 	
 	let maxSpeed = randomFloatRange(25, 50);
	enemySprite.setPhysics(50, maxSpeed, 0);

	enemySprite.physics.setSpeed(1);

	enemySprite.physics.setMotionAngle(Math.random() * 360);	

	enemySprite.setWrap(512, 512);
	enemyArray.push(enemySprite);														
}

// Create a new counter that signifies the number of enemiess left in enemyArray, and also create a label that
// displays the counter.
let enemyCount = enemyArray.length;
let enemyLabel = new Label(100,50);
enemyLabel.setText("Enemies Left: " + enemyCount);
enemyLabel.setFont("Arial Black", 36, "yellow");
enemyLabel.setBorder(2, "black");

// Create a new label to display a game over.
let loseLabel = new Label(150,250);
loseLabel.setText("Game Over!");
loseLabel.setFont("Arial Black", 36, "red");
loseLabel.setBorder(2, "black");

// Create a new label to display a win. 
let winLabel = new Label(150,250);
winLabel.setText("You Win!");
winLabel.setFont("Arial Black", 36, "green");
winLabel.setBorder(2, "black");

// Two new varaibles to check whether the game is over, and how.
winState = false;
loseState = false;


function update()
{
	// Code to make the plane jump
	// Name for space bar is an actual space.
	if (input.isKeyDown(" "))
	{
		//Sets a specific upward speed for the plane
		playerSprite.physics.setSpeed(150);
		playerSprite.physics.setMotionAngle(270);
	}

	// Accelerates the plane towards the ground every frame
	playerSprite.physics.accelerateAtAngle(90);
	
	// Instantiate each Sprite in spriteArray.
	for (let i = 0; i < spriteArray.length; i++)
	{
		spriteArray[i].update();
	}

	// Instantiate each enemy in enemyArray.
	for (let i = 0; i < enemyArray.length; i++)
	{
		// Moves the enemy before updating it.
		enemyArray[i].physics.accelerateAtAngle(enemyArray[i].physics.getMotionAngle());
		enemyArray[i].update();
	}
	
	// Call update on the input function.
	input.update();

	// Checks if the enemies overlap the player, and causes a loss if so.
	for (let i = 0; i < enemyArray.length; i++)
	{
		if(enemyArray[i].overlaps(playerSprite))
		{
			loseState = true;
		}
	}

	// Checks if there are any enemies left, and causes a win if not. 
	if(enemyArray.length == 0)
	{
		winState = true;
	}
}

function render()
{
	// Reset canvas transform.
	context.setTransform( 1,0,0,1, 0,0 );

	// Clear the screen with the following color, and create a stroke around the canvas. 
	context.fillStyle = "#ADD8E6"
	context.fillRect(0,0, 512,512);
	context.strokeRect(0, 0, 512, 512);

	// Draws everything in the spriteArray to the screen. (Background and playerSprite)
	for (let i = 0; i < spriteArray.length; i++)
	{
		spriteArray[i].render(context);
	}

	// Renders each enemy.
	for (let i = 0; i < enemyArray.length; i++)
	{
		enemyArray[i].render(context);
	}

	// Render enemyLabel to the screen.
	enemyLabel.render(context);

	// Renders the winLabel if the game is won.
	if(winState)
	{
		winLabel.render(context);
	}

	// Renders the loseLabel if the game is lost.
	if(loseState)
	{
		loseLabel.render(context);
	}
}

function loop()
{
	// Call all of our functions in order, then recall this function again.
	update();
	render();
	if(!winState && !loseState)
	{
		requestAnimationFrame(loop);
	}
}

// Start the program.
loop();

</script>

</body>
</html>
