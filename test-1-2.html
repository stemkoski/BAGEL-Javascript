// Math.random() -- random decimal number between 0.0 and 1.0
// Create each respective Sprite at a random starting position, and set its size and
// velocity. (Except the background image, which remains static.)

let backSprite = new Sprite(256, 256, "background", false, false);
backSprite.setTexture( new Texture("images/test-1/pokemon-background.png"));
backSprite.setSize(512, 512);

let ballSprite = new Sprite(450 * Math.random(), 450 * Math.random());
ballSprite.setTexture( new Texture("images/test-1/ball.png"));

ballSprite.setPhysics(120, 120, 0);
ballSprite.physics.setSpeed(120);
ballSprite.physics.setMotionAngle(Math.random() * 360);
ballSprite.setBounce();

let spriteArray = [];
spriteArray.push(ballSprite);

function update()
{
	backSprite.update();

	for (let i = 0; i < spriteArray.length; i++)
	{
		spriteArray[i].update();
	}

}

function render()
{
	context.setTransform( 1,0,0,1, 0,0 );

	// Clear the screen with the following color, and create a stroke around the canvas. 
	context.fillStyle = "#444A4E"
	context.fillRect(0,0, 512,512);
	context.strokeRect(0, 0, 512, 512);

	//backSprite.render(context);

	for (let i = 0; i < spriteArray.length; i++)
	{
		spriteArray[i].render(context);
	}
	
}

function loop()
{
	// Call all of our functions in order, then recall this function again.
	update();
	render();
	requestAnimationFrame(loop);
}

// Start the program.
loop();
