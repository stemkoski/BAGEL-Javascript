<html>
<head>
	<title>Test Project</title>
</head>
<body>

<script src="js/vector2.js"></script>
<script src="js/physics.js"></script>

<script src="js/sprite.js"></script>
<script src="js/texture.js"></script>
<script src="js/group.js"></script>

<script src="js/input.js"></script>
<script src="js/label.js"></script>

<script src="js/utilities.js"></script>

<script src="js/action.js"></script>
<script src="js/actionFactory.js"></script>

<canvas width=512 height=512 id="canvas"></canvas>

<img src = "images/test-1/pokemon-background.png" id = "background" hidden>
<img src = "images/test-1/kirball.png" id = "kirball" hidden>

<script>


// =================================================

let ghostTimer = 120;

// Create a new variable, "input", that is set as an Object of the input.js class.
let input = new Input();

// Set up our canvas and Graphics Context.
let canvas = document.getElementById("canvas");
let context = canvas.getContext("2d");

// Math.random() -- random decimal number between 0.0 and 1.0
// Create each respective Sprite at a random starting position, and set its size and
// velocity. (Except the background image, which remains static.)

let backSprite = new Sprite(256, 256, "background", false, false);
backSprite.setTexture( new Texture("images/test-1/pokemon-background.png"));
backSprite.setSize(512, 512);

// Creates a group and a texture for ghosts.
let ghostGroup = new Group();
let ghostTexture = new Texture("images/test-1/ghost_box_1.png");

// Creates our player sprite, and calls setBound(), causing it to be bound to the canvas.
let kirbSprite  = new Sprite(450 * Math.random(), 450 * Math.random());
kirbSprite.setTexture( new Texture("images/test-1/kirball.png"))
kirbSprite.setSize(50,50);
kirbSprite.setBound(512, 512);

let spriteArray = [];
//spriteArray.push();


// Creates a new ghost and adds it to ghostGroup, setting their various values and properties.
function makeGhost()
{
	let ghostTempX = 450 * Math.random() + 25;
	let ghostTempY = 450 * Math.random() + 25;

	let ghostSprite = new Sprite(ghostTempX, ghostTempY);	
	ghostSprite.setTexture(ghostTexture);
	ghostSprite.setSize(50, 50);		

	ghostSprite.setPhysics(0, 90, 0);

	ghostSprite.physics.setSpeed(90);

	ghostSprite.physics.setMotionAngle(Math.random() * 360);

	ghostSprite.setBounce(512, 512);	

	// Add each ghost to ghostGroup.
	ghostGroup.add(ghostSprite);					
}

// Makes one ghost initially
makeGhost();

// Create a new label to display a game over.
let loseLabel = new Label(150,250);
loseLabel.setText("Game Over!");
loseLabel.setFont("Arial Black", 36, "red");
loseLabel.setBorder(2, "black");

// A variable to check whether the game is over.
loseState = false;


function update()
{

	// Continue subtracting 1 tick from ghostTimer.
	ghostTimer--;

	// If ghostTimer is equal to 0.
	if (ghostTimer == 0)
	{
		// Make a new ghost, and reset ghostTimer.
		makeGhost();
		ghostTimer = 120;
	}


	backSprite.update();

	ghostGroup.update();

	kirbSprite.update();

	if ( input.isKeyPressed("ArrowUp") )
	{
		kirbSprite.y -= 2;
	}
	if ( input.isKeyPressed("ArrowDown") )
	{
		kirbSprite.y += 2;
	}
	if ( input.isKeyPressed("ArrowRight") )
	{
		kirbSprite.x += 2;
	}
	if ( input.isKeyPressed("ArrowLeft") )
	{
		kirbSprite.x -= 2;
	}

	ghostList = ghostGroup.getList();

	for (let i = 0; i < ghostList.length; i++)
	{
		kirbSprite.preventOverlap( ghostList[i] );
	}

	for (let i = 0; i < ghostList.length; i++)
	{
		if( kirbSprite.overlaps( ghostList[i] )){
			loseState = true;
		}
	}

}

function render()
{
	context.setTransform( 1,0,0,1, 0,0 );

	// Clear the screen with the following color, and create a stroke around the canvas. 
	context.fillStyle = "#444A4E"
	context.fillRect(0,0, 512,512);
	context.strokeRect(0, 0, 512, 512);

	//backSprite.render(context);

	for (let i = 0; i < spriteArray.length; i++)
	{
		spriteArray[i].render(context);
	}

	ghostGroup.render(context);

	kirbSprite.render(context);

	// Renders the loseLabel if the game is lost.
	if(loseState)
	{
		loseLabel.render(context);
	}
	
}

function loop()
{
	// Call all of our functions in order, then recall this function again.
	update();
	render();
	if(!loseState)
	{
		requestAnimationFrame(loop);
	}
}

// Start the program.
loop();

</script>

</body>
</html>
